# Research pillars for Eunhan Ka's homepage.
# Each pillar lists the BibTeX keys (from _bibliography/papers.bib) it represents.
# Editing this file updates both the hero hover panel and the Research page.

common_foundation: "Network traffic dynamics"

education:
  - degree: "Ph.D."
    field: "Lyles School of Civil and Construction Engineering"
    institution: "Purdue University"
    date: "Dec 2025"
    note: "Dissertation: Physics-Informed Neural Networks for Secure Connected and Autonomous Traffic Modeling"
  - degree: "M.S."
    field: "Department of Civil and Environmental Engineering"
    institution: "Seoul National University"
    date: "Feb 2018"
  - degree: "B.S."
    field: "Department of Civil and Environmental Engineering"
    institution: "Seoul National University"
    date: "Feb 2016"

vision: >
  My research program builds toward resilient and trustworthy mobility systems
  that remain reliable under disruption, adversarial manipulation, and uncertainty.

pillars:
  - id: pinn
    name: "Physics-Informed AI"
    icon: "fa-solid fa-brain"
    blurb: "Traffic-flow theory fused with deep learning for network-scale modeling and state estimation."
    description: >
      I embed traffic-flow theory into machine learning to model and estimate
      traffic dynamics at the network scale. This work includes physics-informed
      formulations of macroscopic models such as the generalized bathtub model
      for large-scale urban networks, graph learning guided by the network
      macroscopic fundamental diagram for traffic state imputation, and adaptive
      domain decomposition for estimating traffic states from sparse sensor data,
      aiming at scalable inference that stays reliable where data are limited.
    papers:
      - ka_adaptive_underreview
      - ka2024piml
      - xue2024nmfd

  - id: resilience
    name: "Network Resilience"
    icon: "fa-solid fa-circle-nodes"
    blurb: "How disruptions and attacks affect network performance, reliability, and recovery."
    description: >
      I study how transportation networks absorb and recover from disruption. My
      work quantifies how climate-driven and cyber disruptions propagate through
      networks, how reliability degrades under such events, and how operations
      can be designed for faster and more dependable recovery, with a focus on
      reliability- and recovery-oriented modeling and decision support at the
      city scale.
    papers:
      - ka2026resilience
      - ka_d2d_underreview

  - id: cybersecurity
    name: "Transportation Cybersecurity"
    icon: "fa-solid fa-shield-halved"
    blurb: "Modeling and detecting route guidance and V2X attacks on connected mobility."
    description: >
      I model and mitigate cyber threats to connected and autonomous mobility.
      This spans route guidance attacks that manipulate driver routing and their
      behavioral and network-level effects, detection of V2X attacks such as fake
      emergency messages, and a broader review of cybersecurity needs for
      next-generation road transportation, with defenses judged by their
      network-level outcomes.
    papers:
      - ka2026mirage
      - ka2025rga
      - ukkusuri2025cyberreview

  - id: optimization
    name: "Optimization & Human Behavior"
    icon: "fa-solid fa-route"
    blurb: "Traffic assignment, routing games, and driver behavior in mobility systems."
    description: >
      I combine optimization, game theory, and behavioral modeling to study how
      travelers route and respond in mobility systems. This includes mean field
      routing games for connected and autonomous vehicles, analytical
      network-flow frameworks for traffic under route guidance attacks, and
      empirical studies of driver behavior such as gap acceptance and surrogate
      safety measures, connecting individual behavior to network-level
      performance.
    papers:
      - ka2023routinggames
      - ka2022lanemanagement
      - ka2020ssm
      - lee2018rain
